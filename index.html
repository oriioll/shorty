<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#02050c" />
    <meta name="color-scheme" content="dark" />

    <!-- Primary Meta Tags -->
    <title>Shorty - Fast & Free URL Shortener | Shorten Links Instantly</title>
    <meta name="title" content="Shorty - Fast & Free URL Shortener | Shorten Links Instantly" />
    <meta
      name="description"
      content="Shorty is a fast, free URL shortener that lets you shorten long links in seconds. Paste your link, get a shortened URL instantly, and share it anywhere."
    />
    <meta
      name="keywords"
      content="URL shortener, short links, link shortener, URL shortening, bit.ly alternative, tinyurl alternative, free link shortener"
    />
    <meta name="author" content="Shorty" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://appshorty.vercel.app" />
    <meta
      property="og:title"
      content="Shorty - Fast & Free URL Shortener | Shorten Links Instantly"
    />
    <meta
      property="og:description"
      content="Shorty is a fast, free URL shortener that lets you shorten long links in seconds. Paste your link, get a shortened URL instantly, and share it anywhere."
    />
    <meta property="og:image" content="https://appshorty.vercel.app/og-image.png" />
    <meta property="og:site_name" content="Shorty" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://appshorty.vercel.app" />
    <meta
      name="twitter:title"
      content="Shorty - Fast & Free URL Shortener | Shorten Links Instantly"
    />
    <meta
      name="twitter:description"
      content="Shorty is a fast, free URL shortener that lets you shorten long links in seconds. Paste your link, get a shortened URL instantly, and share it anywhere."
    />
    <meta name="twitter:image" content="https://appshorty.vercel.app/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://appshorty.vercel.app" />

    <!-- Additional Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shorty" />

    <!-- JSON-LD Schema for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Shorty",
        "description": "A fast and free URL shortener that lets you shorten long links in seconds",
        "url": "https://appshorty.vercel.app",
        "applicationCategory": "Utility",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Organization",
          "name": "Shorty",
          "url": "https://github.com/oriioll/shorty"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
